name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: test
      APPROVAL_SIGNING_KEY: ci-test-only-approval-signing-key-32-chars
      RECOVERY_SIGNING_KEY: ci-test-only-recovery-signing-key-32-chars
      AUDIT_SIGNING_KEY: ci-test-only-audit-signing-key-value-32
      CORS_ORIGINS: http://127.0.0.1:3000
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Install backend
        run: python -m pip install -r backend/requirements.txt
      - name: Frontend tests
        working-directory: frontend
        run: npm run test
      - name: Frontend lint
        working-directory: frontend
        run: npm run lint
      - name: Frontend build
        working-directory: frontend
        run: npm run build
      - name: Backend tests
        working-directory: backend
        run: python -m pytest
      - name: Install Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Browser tests
        working-directory: frontend
        run: npm run test:e2e
      - name: Lightweight secret scan
        run: python scripts/check_secrets.py
      - name: Whitespace check
        run: git diff --check
